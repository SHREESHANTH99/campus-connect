version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: campus_postgres
    environment:
      POSTGRES_USER: campus
      POSTGRES_PASSWORD: campus123
      POSTGRES_DB: campus_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: campus_redis
    ports:
      - "6379:6379"

  backend:
    build: .
    container_name: campus_backend
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    env_file:
      - .env

volumes:
  postgres_data:
